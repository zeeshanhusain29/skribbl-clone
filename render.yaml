services:
  # Backend Service
  - type: web
    name: skribbl-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: YOUR_FRONTEND_URL_HERE

  # Frontend Service
  - type: web
    name: skribbl-frontend
    env: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_SOCKET_URL
        value: YOUR_BACKEND_URL_HERE
      - key: VITE_BACKEND_URL
        value: YOUR_BACKEND_URL_HERE
