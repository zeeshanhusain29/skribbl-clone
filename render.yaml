services:
  # Backend Service
  - type: web
    name: skribbl-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://skribbl-frontend.onrender.com

  # Frontend Service
  - type: web
    name: skribbl-frontend
    env: node
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l $PORT
    rootDir: .
    envVars:
      - key: VITE_SOCKET_URL
        value: https://skribbl-backend.onrender.com
      - key: VITE_BACKEND_URL
        value: https://skribbl-backend.onrender.com
